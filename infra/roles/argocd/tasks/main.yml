
---
# Apply Traefik Middleware for HTTP to HTTPS redirect
- name: Apply Traefik Middleware for HTTP to HTTPS redirect
  kubernetes.core.k8s:
    state: present
    namespace: argocd
    src: traefik-redirect-middleware.yaml
  environment:
    KUBECONFIG: /home/vagrant/k3s.yaml

# Apply Traefik Ingress for ArgoCD
- name: Apply Traefik Ingress for ArgoCD
  kubernetes.core.k8s:
    state: present
    namespace: argocd
    src: ingress-argocd.yaml
  environment:
    KUBECONFIG: /home/vagrant/k3s.yaml

- name: Create argocd namespace
  kubernetes.core.k8s:
    api_version: v1
    kind: Namespace
    name: argocd
  environment:
    KUBECONFIG: /home/vagrant/k3s.yaml

- name: Install ArgoCD
  kubernetes.core.k8s:
    state: present
    namespace: argocd
    src: https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
  environment:
    KUBECONFIG: /home/vagrant/k3s.yaml
